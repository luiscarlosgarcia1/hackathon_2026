<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CivicLens{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="{{ url_for('web.list_hearings') }}">CivicLens</a>
      <div class="nav-links">
        <a href="{{ url_for('web.list_hearings') }}">Hearings</a>
        <a href="{{ url_for('web.new_hearing') }}">Submit a Hearing</a>
      </div>
    </div>
  </nav>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
