{% extends "base.html" %}
{% block title %}Submit a Hearing — CivicLens{% endblock %}

{% block content %}
<h1>Submit a Hearing</h1>

{% if error %}
<div class="flash flash-error">{{ error }}</div>
{% endif %}

<form method="POST" action="{{ url_for('web.new_hearing') }}">
  <div class="form-group">
    <label for="title">Title <span class="required">*</span></label>
    <input type="text" id="title" name="title" value="{{ form_data.title or '' }}" required>
  </div>

  <div class="form-group">
    <label for="date">Date <span class="required">*</span></label>
    <input type="date" id="date" name="date" value="{{ form_data.date or '' }}" required>
  </div>

  <div class="form-group">
    <label for="transcript">Transcript</label>
    <textarea id="transcript" name="transcript" rows="8">{{ form_data.transcript or '' }}</textarea>
  </div>

  <div class="form-group">
    <label for="agenda">Agenda</label>
    <textarea id="agenda" name="agenda" rows="5">{{ form_data.agenda or '' }}</textarea>
  </div>

  <button type="submit" class="btn">Submit Hearing</button>
</form>
{% endblock %}
