{% extends "base.html" %}
{% block title %}Sign Up — CivicLens{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Join CivicLens</h1>
    <p class="auth-subtitle">Create an account to participate in civic discussions</p>

    {% if error %}
    <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('web.signup') }}">
      <div class="form-group">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" required placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" style="width:100%">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="{{ url_for('web.login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
